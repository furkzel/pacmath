name: Build & Release PAC-MATH

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
        include:
          - os: windows-latest
            artifact_name: PacMath-Windows
            bin_name: PacMath.exe
            data_sep: ";"
          - os: macos-latest
            artifact_name: PacMath-MacOS
            bin_name: PacMath_Mac
            data_sep: ":"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Executable (Windows)
        if: matrix.os == 'windows-latest'
        shell: cmd
        run: |
          pyinstaller --onefile --noconsole --name PacMath ^
            --add-data "assets;assets" ^
            --hidden-import websockets ^
            run_local.py

      - name: Build Executable (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          pyinstaller --onefile --noconsole --name PacMath_Mac \
            --add-data "assets:assets" \
            --hidden-import websockets \
            run_local.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.bin_name }}
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.bin_name }}
          generate_release_notes: true
